<link rel="stylesheet" href="styles.css">

    <header class="main-header">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <div class="container header-grid">
            <img src="kc-logo.png" alt="KC Logo" class="header-logo kc-logo">
            
            <div class="header-text">
                <h1>ISGH KHUTBAH SCHEDULE</h1>
                <p id="current-date">Loading date...</p>

        </div>
    </header>

    <div class="container">
        <div class="search-wrapper">
            <input type="text" id="masjid-search" placeholder="Search by Masjid Name, Address, or Khateeb...">
        </div>
        <main id="schedule-container"></main>
    </div>
